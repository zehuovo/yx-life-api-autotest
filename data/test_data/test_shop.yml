get_shop_type_list:
  # 1. 面子工程：报告上展示的信息
  allure:
    title: "悦享生活 - 获取商铺分类列表"
    description: "验证首页商铺分类能否正常拉取数据"
    epic: "悦享生活平台"
    feature: "商铺模块"
    tag: ["核心业务", "P0"]
    pytest_mark: "api"

  # 2. 里子工程：真实的测试步骤
  steps:
    request:
      method: "GET"
      url: "/shop-type/list"  
      # headers 不用写，我们在 conftest.py 里已经让系统自动带上 Token 了
      
    expected:
      status_code: 200        # 断言1：HTTP 状态码必须是 200
      response:
        success: true         # 断言2：悦享生活服务标准的返回体，必须包含 success: true
        # data:               # 断言3：如果你想更严格，可以放开这行，断言 data 下必须包含内容
        #   type: list
