add_voucher_normal_all_required_fields:
  allure:
    title: 新增优惠券-正常场景-所有必填字段
    description: 验证使用所有必填字段（shopId, title, payValue, actualValue, type）新增优惠券，接口正常返回优惠券ID
    epic: 优惠券管理
    feature: 优惠券管理模块
    story: 新增优惠券
    tag: [正常场景, 冒烟用例]
    pytest_mark: smoke
  steps:
    request:
      method: POST
      url: /voucher
      headers: {}
      params: {}
      json: {shopId: 1, title: '测试优惠券_${timestamp}', payValue: 1000, actualValue: 1500,
        type: 1}
    expected:
      status_code: 200
      response: {success: true}
    extract: {}
