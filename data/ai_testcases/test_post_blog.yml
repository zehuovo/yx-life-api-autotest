publish_blog_normal_success:
  allure:
    title: 发布探店笔记-正常场景-成功发布笔记
    description: 验证用户使用完整的必填参数和可选参数发布探店笔记，接口返回成功状态和笔记ID
    epic: 探店系统
    feature: 笔记管理模块
    story: 发布探店笔记
    tag: [正常场景, 冒烟用例]
    pytest_mark: smoke
  steps:
    request:
      method: POST
      url: /blog
      headers: {}
      params: {}
      json: {shopId: 1, title: '探店笔记标题_${timestamp}', images: /imgs/blogs/blog1.jpg,
        content: 这是一条探店笔记的内容}
    expected:
      status_code: 200
      response: {success: true}
