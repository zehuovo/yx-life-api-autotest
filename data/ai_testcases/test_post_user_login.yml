user_login_abnormal_wrong_code:
  allure:
    description: 验证用户使用正确的手机号和错误的验证码登录，接口返回失败信息
    epic: 用户中心系统
    feature: 用户认证模块
    pytest_mark: login
    story: 手机验证码登录
    tag: [异常场景]
    title: 用户登录-异常场景-错误的验证码登录失败
  steps:
    request:
      headers: {}
      json: {code: '000000', phone: '138${random_int}'}
      method: POST
      params: {}
      url: /user/login
    expected:
      response: {success: false}
      status_code: 200
