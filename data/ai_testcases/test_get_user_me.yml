user_me_normal_get_current_user:
  allure:
    description: 验证能够成功获取当前登录用户的基本信息，包括id、nickName、icon等字段
    epic: 用户中心系统
    feature: 用户信息模块
    pytest_mark: smoke
    story: 查询当前登录用户
    tag: [正常场景, 冒烟用例]
    title: 查询当前登录用户-正常场景-获取用户基本信息
  steps:
    request:
      headers: {}
      json: {}
      method: GET
      params: {}
      url: /user/me
    expected:
      response:
        data:
          required_fields: [id, nickName, icon]
        success: true
      status_code: 200
