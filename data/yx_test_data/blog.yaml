get_hot_blog:
  allure:
    title: "查询热门探店笔记"
    description: "测试分页查询热门探店笔记列表"
    epic: "悦享生活服务平台"
    feature: "探店笔记模块"
    story: "热门笔记"
    tag: ["笔记", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/blog/hot"
      params:
        current: 1
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

