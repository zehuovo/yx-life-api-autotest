    feature: "探店笔记模块"
    story: "发布笔记"
    tag: ["笔记", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "POST"
      url: "/blog"
      json:
        shopId: 1
        title: ""
        images: "/imgs/blogs/blog1.jpg"
        content: "这是一条测试内容"
      headers: {}

    expected:
      status_code: 200
      response:
        success: false

