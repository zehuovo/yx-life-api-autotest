check_follow_status:
  allure:
    title: "查询是否已关注"
    description: "测试查询当前用户是否已关注目标用户"
    epic: "悦享生活服务平台"
    feature: "关注模块"
    story: "关注状态"
    tag: ["关注", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/follow/or/not/2"
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

