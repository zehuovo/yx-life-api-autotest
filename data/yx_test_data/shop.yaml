# ============================================
# 悦享生活服务平台 - 店铺模块测试用例数据
# ============================================

get_shop_type_list:
  allure:
    title: "获取商铺分类列表"
    description: "测试获取所有商铺分类列表接口，无需登录"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "商铺分类"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop-type/list"
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

get_shop_by_id:
  allure:
    title: "查询商铺详情"
    description: "测试根据ID查询商铺详细信息"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "商铺查询"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop/1"
      headers: {}

    expected:
      status_code: 200
      response:
        success: true
        data:
          required_fields: ["id", "name", "typeId", "images", "area", "address", "avgPrice", "sold", "comments", "score", "openHours"]

get_shop_not_found:
  allure:
    title: "查询不存在的商铺"
    description: "测试查询一个不存在的商铺ID，期望返回错误提示"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "商铺查询"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop/99999"
      headers: {}

    expected:
      status_code: 200
      response:
        success: false
        errorMsg: "店铺不存在！"

get_shop_by_type:
  allure:
    title: "按类型分页查询商铺"
    description: "测试按商铺类型分页查询"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "商铺查询"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop/of/type"
      params:
        typeId: 1
        current: 1
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

get_nearby_shops:
  allure:
    title: "按距离查询附近商铺"
    description: "测试基于地理位置（Redis GEO）按距离查询附近商铺（5公里内）"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "附近商铺"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop/of/type"
      params:
        typeId: 1
        current: 1
        x: 116.30829
        y: 40.05307
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

search_shop_by_name:
  allure:
    title: "按名称搜索商铺"
    description: "测试根据商铺名称关键字搜索"
    epic: "悦享生活服务平台"
    feature: "店铺模块"
    story: "商铺搜索"
    tag: ["店铺", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "GET"
      url: "/shop/of/name"
      params:
        name: "花"
        current: 1
      headers: {}

    expected:
      status_code: 200
      response:
        success: true
