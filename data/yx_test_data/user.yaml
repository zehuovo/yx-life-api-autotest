send_code_success:
  allure:
    title: "发送验证码成功测试用例"
    description: "测试发送手机验证码接口，使用正确的手机号格式"
    epic: "悦享生活服务平台"
    feature: "用户模块"
    story: "发送验证码"
    tag: ["用户", "接口测试"]
    pytest_mark: "api"

  steps:
    request:
      method: "POST"
      url: "/user/code"
      params:
        phone: "13800138000"
      headers: {}

    expected:
      status_code: 200
      response:
        success: true

send_code_invalid_phone:
  allure:
    title: "发送验证码-手机号格式错误"
    description: "测试发送验证码接口，使用错误的手机号格式"
    epic: "悦享生活服务平台"
