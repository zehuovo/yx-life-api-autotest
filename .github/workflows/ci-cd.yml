name: YX-Life API Test CI/CD 

on:
  push:
    branches: [ "main", "master" ] 
  pull_request:
    branches: [ "main", "master" ] 
  workflow_dispatch:               

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
      pages: write     
      id-token: write  

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 确保 requirements.txt 里加上了 pymysql 和 redis 这两个库！

      - name: 安装 Allure
        run: |
          curl -sLo allure-2.27.0.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: 生成.env配置文件 (注入后端中间件配置)
        run: |
          echo "SERVER_URL=${{ secrets.SERVER_URL }}" >> .env
          # 下面这些是新增的！用于 Python 脚本直连数据库进行深度断言
          echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
          echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PWD=${{ secrets.MYSQL_PWD }}" >> .env
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          echo "REDIS_PWD=${{ secrets.REDIS_PWD }}" >> .env

      - name: 执行悦享生活核心链路自动化测试
        run: |
          python3 start.py

      - name: 部署 Allure 测试报告到 Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: report
          publish_branch: gh-pages
          force_orphan: true
